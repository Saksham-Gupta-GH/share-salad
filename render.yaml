databases:
  - name: share-salad-db
    plan: free
    databaseName: share_sallad
    user: share_sallad

services:
  - type: web
    name: share-salad
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: share-salad-db
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: NODE_ENV
        value: production
